name: Bug Report
description: File a bug report
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Make sure that you have upgraded your flow to use the latest release of dynamic ESS before continuing.
  - type: input
    id: contact
    attributes:
      label: Contact Details
      description: How can we get in touch with you if we need more info?
      placeholder: ex. email@example.com
    validations:
      required: false
  - type: input
    id: id
    attributes:
      label: VRM / Site iD
      description: The vrm or site id the problem plays. If you don't want to give that, please do fill out the parameter inputs.
      placeholder: ex. 123456
    validations:
      required: false
  - type: input
    id: B_max
    attributes:
      label: B max
      description: Usable battery capacity (kWh)
      placeholder: ex. 15
    validations:
      required: false
  - type: input
    id: TB_max
    attributes:
      label: TB max
      description: Amount the battery charges in one hour (kW)
      placeholder: ex. 2.7
    validations:
      required: false
  - type: input
    id: FB_max
    attributes:
      label: FB max
      description: Amount the battery discharges in one hour (kW)
      placeholder: ex. 2.7
    validations:
      required: false
  - type: input
    id: TG_max
    attributes:
      label: TG max
      description: Amount the grid can receive (to grid) in one hour (kW)
      placeholder: ex. 2.7
    validations:
      required: false
  - type: input
    id: FG_max
    attributes:
      label: FG max
      description: Amount the grid can provide (from grid) in one hour (kW)
      placeholder: ex. 2.7
    validations:
      required: false
  - type: input
    id: b_costs
    attributes:
      label: Battery costs
      description: Battery costs (&euro;/kWh)
      placeholder: ex. 2.7
    validations:
      required: false
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen?
      placeholder: Tell us what you see!
      value: "A bug happened!"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Please copy and paste any relevant log output. This will be automatically formatted into code, so no need for backticks.
      render: shell
  - type: textarea
    id: screenshot
    attributes:
      label: "Screenshots"
      description: If applicable, add screenshots to help explain your problem.
      value: |
        ![DESCRIPTION](LINK.png)
      render: bash
    validations:
      required: false
